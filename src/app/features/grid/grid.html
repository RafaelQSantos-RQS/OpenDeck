<app-titlebar title="OpenDeck" id="titlebar" class="titlebar"></app-titlebar>
<tui-loader [overlay]="true" [loading]="loading()">
  <div class="grid">
    @for (slot of slots; track $index; let pos = $index) {
      <app-button-card
        [button]="slot ?? undefined"
        [position]="pos"
        (edit)="openEditor($event)"
        (delete)="deleteButton($event)"
        (add)="openEditor(undefined, $event)"
      />
    }
  </div>
</tui-loader>
